name: conformance-taudit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  taudit-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Install taudit CLI
        run: cargo install taudit --locked
      - name: taudit workflow scan
        run: bash scripts/ci/conformance_taudit.sh
