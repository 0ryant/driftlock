name: publish-dry-run

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - run: bash scripts/harden.sh
      - name: cargo publish --dry-run (ordered)
        run: |
          for pkg in driftlock-contracts driftlock-git driftlock-skills driftlock-core driftlock-store driftlock-cli; do
            cargo publish -p "$pkg" --locked --dry-run
          done
