name: quality

on:
  push:
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo run -p driftlock-contracts --bin export-schemas -- contracts/schemas
      - run: python3 scripts/verify_scaffold.py
      - name: Contract validation
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 -m pip install -r scripts/requirements-contracts.txt pyyaml
          python3 scripts/validate_contracts.py
          python3 scripts/validate_audit_operations.py
          bash scripts/ci/check_cloudevents_schema.sh
